name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write        # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checks
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm smoke

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest    # trusted publishing needs npm >= 11.5.1

      - name: Publish to npm (provenance via OIDC trusted publishing)
        run: npm publish --provenance --access public
        # prepack (pnpm build) runs automatically before the tarball is created.
        #
        # Token fallback (if Trusted Publishing is NOT configured on npm):
        #   add `env: { NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} }` to this step.
        #   setup-node's registry-url already writes the .npmrc authToken line.
